<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enji Perfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fff; }
        .product-card { border-radius: 20px; overflow: hidden; border: 1px solid #f3f4f6; transition: 0.3s; background: #fff; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-order { background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); }
    </style>
</head>
<body class="text-gray-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">ENJI PERFUME</h1>
            <p class="text-[8px] uppercase tracking-[0.3em] text-gray-400">Luxury Collection</p>
        </div>
        <div class="flex items-center space-x-5">
            <a href="tel:88120525" class="text-gray-700 text-lg hover:text-black"><i class="fas fa-phone-alt"></i></a>
            <a href="https://www.facebook.com/share/1KhMToLN7S/" target="_blank" class="text-gray-700 text-xl hover:text-blue-600"><i class="fab fa-facebook-f"></i></a>
            <button onclick="toggleCart()" class="relative">
                <i class="fas fa-shopping-bag text-2xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white z-[60] shadow-2xl transform translate-x-full transition-transform duration-300 overflow-y-auto">
        <div class="p-8">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold">Таны сагс</h2>
                <button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-black">&times;</button>
            </div>

            <div id="cart-items" class="space-y-6 mb-8 text-sm">
                </div>

            <div class="space-y-6">
                <div class="flex justify-between text-xl font-bold border-t pt-4">
                    <span>Нийт:</span>
                    <span id="total-price" class="text-red-600">0₮</span>
                </div>

                <div class="bg-gray-50 p-5 rounded-2xl space-y-3 border border-gray-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Төлбөр хүлээн авагч: Энхжаргал</p>
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm">
                        <span class="font-bold text-sm">Хаан банк: 5458026272</span>
                        <button onclick="copyAcc()" class="text-[10px] bg-black text-white px-3 py-1 rounded-lg active:bg-gray-700">Хуулах</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <input type="text" id="phone" placeholder="Холбоо барих утас" class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-black transition">
                    <textarea id="address" placeholder="Хүргэлтийн хаяг" class="w-full p-4 bg-gray-50 rounded-xl outline-none border border-transparent focus:border-black transition h-24"></textarea>
                    
                    <label class="block">
                        <span class="text-[10px] font-bold text-gray-400 uppercase ml-1">Гүйлгээний баримт (Зураг)</span>
                        <input type="file" id="receipt" class="mt-1 block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-black file:text-white cursor-pointer">
                    </label>
                </div>

                <button onclick="sendOrder()" class="w-full btn-order text-white py-5 rounded-2xl font-bold tracking-widest shadow-lg active:scale-95 transition">
                    ЗАХИАЛГА ИЛГЭЭХ
                </button>
            </div>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8578358695:AAGDHEjmw1EDhkdH60HWfys498gmuGM-Njo';
        const TG_ID = '7069407872';

        // Барааны жагсаалт
        const products = [
            { id: 1, name: "Prada Set", img: "1.jpg" },
            { id: 2, name: "D&G Light Blue Set", img: "2.jpg" },
            { id: 3, name: "Victoria's Secret Bombshell", img: "3.jpg" },
            { id: 4, name: "212 Sexy Men", img: "4.jpg" },
            { id: 5, name: "YSL Mon Paris", img: "5.jpg" },
            { id: 6, name: "Prada Luna Rossa Ocean", img: "6.jpg" },
            { id: 7, name: "Bvlgari Pour Homme", img: "7.jpg" },
            { id: 8, name: "Dior Miniature Set", img: "8.jpg" },
            { id: 9, name: "Chanel Miniature Set", img: "9.jpg" },
            { id: 10, name: "Creed Miniature Set", img: "10.jpg" },
            { id: 11, name: "Afnan 9AM/9PM Set", img: "11.jpg" },
            { id: 12, name: "Viktor&Rolf Spicebomb Set", img: "12.jpg" },
            { id: 13, name: "MFK Baccarat Rouge Set", img: "13.jpg" },
            { id: 14, name: "Valentino Born In Roma Set", img: "14.jpg" }
        ];

        let cart = [];

        function init() {
            const grid = document.getElementById('product-grid');
            // GitHub Pages дээр зургийг "./нэр.jpg" гэж дуудах нь илүү найдвартай
            grid.innerHTML = products.map(p => {
                const price = (p.img === "6.jpg" || p.img === "12.jpg") ? 120000 : 100000;
                return `
                    <div class="product-card">
                        <div class="relative h-48 md:h-72 bg-gray-50 flex items-center justify-center">
                            <img src="./${p.img}" class="w-full h-full object-cover" 
                                 onerror="this.src='https://via.placeholder.com/400?text=${p.img}+oldsongui'">
                            <div class="absolute top-3 right-3 bg-white/90 px-3 py-1 rounded-full text-[10px] font-black shadow-sm">
                                ${price.toLocaleString()}₮
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="text-[10px] font-bold uppercase tracking-tighter h-8 overflow-hidden">${p.name}</h3>
                            <button onclick="addToCart('${p.name}', ${price}, './${p.img}')" 
                                    class="w-full mt-3 bg-black text-white py-3 rounded-xl text-[10px] font-bold hover:bg-gray-800 transition active:scale-95">
                                САГСЛАХ
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCart();
            // Сагсанд нэмэхэд sidebar-г нээж харуулна
            document.getElementById('cart-sidebar').classList.remove('translate-x-full');
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartList = document.getElementById('cart-items');
            cartList.innerHTML = cart.map((item, index) => `
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border border-gray-100">
                    <div class="flex items-center space-x-3">
                        <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover bg-white">
                        <div>
                            <p class="font-bold text-[10px]">${item.name}</p>
                            <p class="text-xs font-black text-red-500">${item.price.toLocaleString()}₮</p>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${index})" class="text-gray-300 hover:text-red-500 transition">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = total.toLocaleString() + '₮';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function copyAcc() {
            navigator.clipboard.writeText("5458026272");
            alert("Дансны дугаар хуулагдлаа!");
        }

        async function sendOrder() {
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const file = document.getElementById('receipt').files[0];

            if (!phone || !address || cart.length === 0) {
                alert("Мэдээллээ бүрэн оруулна уу!");
                return;
            }

            let msg = `🛍️ *ШИНЭ ЗАХИАЛГА* 🛍️\n\n`;
            msg += `📞 Утас: ${phone}\n`;
            msg += `📍 Хаяг: ${address}\n`;
            msg += `💰 Нийт дүн: ${document.getElementById('total-price').innerText}\n\n`;
            msg += `🛒 *Бараанууд:* \n`;
            cart.forEach((p, i) => msg += `${i+1}. ${p.name} - ${p.price.toLocaleString()}₮\n`);

            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_ID, text: msg, parse_mode: 'Markdown' })
                });

                if (file) {
                    const fd = new FormData();
                    fd.append('chat_id', TG_ID);
                    fd.append('photo', file);
                    fd.append('caption', `🧾 Төлбөрийн баримт: ${phone}`);
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }

                alert("Захиалга амжилттай илгээгдлээ! Тантай удахгүй холбогдох болно. ✨");
                cart = [];
                updateCart();
                toggleCart();
            } catch (e) {
                alert("Алдаа гарлаа. Интернетээ шалгаад дахин оролдоно уу.");
            }
        }

        window.onload = init;
    </script>
</body>
</html>
