<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enji Perfume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fff; }
        .product-card { border-radius: 20px; overflow: hidden; border: 1px solid #eee; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .btn-order { background: linear-gradient(135deg, #000 0%, #333 100%); }
    </style>
</head>
<body class="text-gray-900">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic tracking-tighter">ENJI PERFUME</h1>
            <p class="text-[8px] uppercase tracking-[0.3em] text-gray-400">Luxury Collection</p>
        </div>
        <div class="flex items-center space-x-5">
            <a href="tel:88020525" class="text-gray-700 text-lg"><i class="fas fa-phone-alt"></i></a>
            <a href="https://www.facebook.com/share/1KhMToLN7S/" target="_blank" class="text-gray-700 text-xl"><i class="fab fa-facebook-f"></i></a>
            <button onclick="toggleCart()" class="relative">
                <i class="fas fa-shopping-bag text-2xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">

            </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white z-[60] shadow-2xl transform translate-x-full transition-transform duration-300 overflow-y-auto">
        <div class="p-8">
            <div class="flex justify-between items-center mb-8 border-b pb-4">
                <h2 class="text-2xl font-bold">Сагс</h2>
                <button onclick="toggleCart()" class="text-3xl text-gray-300">&times;</button>
            </div>

            <div id="cart-items" class="space-y-6 mb-8">
                </div>

            <div class="space-y-6">
                <div class="flex justify-between text-xl font-bold border-t pt-4">
                    <span>Нийт:</span>
                    <span id="total-price" class="text-red-600">0₮</span>
                </div>

                <div class="bg-blue-50 p-5 rounded-2xl space-y-2 border border-blue-100">
                    <p class="text-xs font-bold text-blue-600 uppercase tracking-widest">Төлбөр хүлээн авагч: Энхжаргал</p>
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl">
                        <span class="font-bold text-sm">Хаан банк: <span id="acc">5458026272</span></span>
                        <button onclick="copyAcc()" class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-lg">Хуулах</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <input type="text" id="phone" placeholder="Холбоо барих утас" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-1 focus:ring-black transition">
                    <textarea id="address" placeholder="Хүргэлтийн хаяг" class="w-full p-4 bg-gray-50 rounded-xl outline-none focus:ring-1 focus:ring-black transition h-24"></textarea>
                    
                    <label class="block">
                        <span class="text-[10px] font-bold text-gray-400 uppercase ml-1">Гүйлгээний баримт (Зураг)</span>
                        <input type="file" id="receipt" class="mt-1 block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-gray-100 file:text-black">
                    </label>
                </div>

                <button onclick="sendOrder()" class="w-full btn-order text-white py-5 rounded-2xl font-bold tracking-widest shadow-lg active:scale-95 transition">
                    ЗАХИАЛГА ИЛГЭЭХ
                </button>
            </div>
        </div>
    </div>
