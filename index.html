<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enji's Perfume Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f9f9; }
        .product-card { background: #fff; border-radius: 20px; border: 1px solid #eee; transition: 0.3s; display: flex; flex-direction: column; overflow: hidden; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }
        .btn-black { background: #000; color: #fff; transition: 0.2s; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #fff; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .file-box { border: 2px dashed #ddd; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; background: #fafafa; }
    </style>
</head>
<body class="text-gray-900">

    <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-xl md:text-2xl font-black italic tracking-tighter text-black">ENJI PERFUME</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-gray-400 font-bold">Luxury Collection</p>
        </div>
        <div class="flex items-center space-x-5">
            <a href="https://www.facebook.com/share/1KhMToLN7S/" target="_blank" class="text-blue-600 text-xl"><i class="fab fa-facebook"></i></a>
            <a href="tel:88120525" class="text-black text-lg"><i class="fas fa-phone-alt"></i></a>
            <button onclick="toggleCart()" class="relative">
                <i class="fas fa-shopping-bag text-2xl text-black"></i>
                <span id="cart-count" class="absolute -top-1 -right-2 bg-black text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6"></div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white z-[60] shadow-2xl transform translate-x-full transition-transform duration-300 overflow-y-auto">
        <div class="p-6 md:p-8">
            <div class="flex justify-between items-center mb-6 border-b pb-4 text-black">
                <h2 class="text-lg font-black uppercase tracking-widest">Миний Сагс</h2>
                <button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-black transition">&times;</button>
            </div>

            <div id="cart-items" class="space-y-4 mb-6"></div>

            <div class="space-y-5 border-t pt-6">
                <div class="space-y-2 font-bold text-sm">
                    <div class="flex justify-between text-gray-400 uppercase text-[10px]">
                        <span>Барааны дүн:</span>
                        <span id="sub-total">0₮</span>
                    </div>
                    <div id="delivery-fee-row" class="flex justify-between text-gray-400 uppercase text-[10px]">
                        <span>Хүргэлт:</span>
                        <span>3,000₮</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black pt-3 border-t text-black">
                        <span>НИЙТ:</span>
                        <span id="total-price">0₮</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-2 p-1 bg-gray-100 rounded-xl">
                    <button onclick="setDelivery('delivery')" id="btn-delivery" class="py-3 rounded-lg text-[10px] font-black uppercase transition bg-white shadow-sm text-black">Хүргэлтээр</button>
                    <button onclick="setDelivery('pickup')" id="btn-pickup" class="py-3 rounded-lg text-[10px] font-black uppercase transition text-gray-400">Өөрөө авах</button>
                </div>

                <div id="pickup-info" class="hidden bg-black text-white p-4 rounded-xl border-l-4 border-yellow-500">
                    <p class="text-[9px] font-bold uppercase tracking-widest text-gray-400 mb-1">📍 Очих хаяг:</p>
                    <p class="text-[11px] leading-relaxed">Дундговь аймаг, Сайнцагаан сум,Мандал хороолол 1416 .</p>
                </div>

                <div class="bg-gray-50 p-5 rounded-2xl border border-gray-100 space-y-3">
                    <p class="text-[9px] font-black text-gray-400 uppercase tracking-widest text-center">Хүлээн авагч: <span class="text-black">ЭНХЖАРГАЛ</span></p>
                    <div class="bg-white p-3 rounded-xl flex justify-between items-center shadow-sm">
                        <div>
                            <p class="text-[9px] font-bold text-gray-400">ХААН БАНК</p>
                            <p class="font-black text-lg">5458026272</p>
                        </div>
                        <button onclick="copyAcc()" class="bg-black text-white px-3 py-2 rounded-lg text-[10px] font-black active:scale-95 transition">ХУУЛАХ</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <input type="text" id="phone" placeholder="Утасны дугаар" class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-1 focus:ring-black outline-none font-bold text-sm">
                    
                    <div id="address-container">
                        <textarea id="address" placeholder="Хүргэлтийн хаяг" class="w-full p-4 bg-gray-50 rounded-xl border-none focus:ring-1 focus:ring-black outline-none font-bold text-sm h-20 resize-none"></textarea>
                    </div>
                    
                    <label class="file-box block">
                        <input type="file" id="receipt" class="hidden" onchange="updateFileName(this)">
                        <div id="file-label">
                            <i class="fas fa-camera mb-2 block text-gray-400 text-xl"></i>
                            <span class="text-[10px] font-black uppercase text-gray-500">Баримт хавсаргах</span>
                        </div>
                    </label>
                </div>

                <button id="send-order-btn" onclick="sendOrder()" class="w-full btn-black py-5 rounded-2xl font-black tracking-widest shadow-xl active:scale-95 transition uppercase text-sm">
                    Захиалга илгээх
                </button>
                
                <div class="flex justify-center space-x-4 pt-2">
                    <a href="https://www.facebook.com/share/1KhMToLN7S/" target="_blank" class="text-[10px] font-black text-blue-600 uppercase tracking-widest"><i class="fab fa-facebook mr-1"></i> Facebook</a>
                    <span class="text-gray-200">|</span>
                    <a href="tel:88120525" class="text-[10px] font-black text-gray-600 uppercase tracking-widest"><i class="fas fa-phone-alt mr-1"></i> 88120525</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8578358695:AAGDHEjmw1EDhkdH60HWfys498gmuGM-Njo';
        const TG_ID = '7069407872';
        let deliveryType = 'delivery'; 

        const products = [
            { id: 1, name: "Prada Set", img: "1.jpg", price: 100000 },
            { id: 2, name: "D&G Light Blue Set", img: "2.jpg", price: 100000 },
            { id: 3, name: "Victoria's Secret Bombshell", img: "3.jpg", price: 100000 },
            { id: 4, name: "212 Sexy Men", img: "4.jpg", price: 100000 },
            { id: 5, name: "YSL Mon Paris", img: "5.jpg", price: 100000 },
            { id: 6, name: "Prada Luna Rossa Ocean", img: "6.jpg", price: 120000 },
            { id: 7, name: "Bvlgari Pour Homme", img: "7.jpg", price: 100000 },
            { id: 8, name: "Dior Miniature Set", img: "8.jpg", price: 100000 },
            { id: 9, name: "Chanel Miniature Set", img: "9.jpg", price: 100000 },
            { id: 10, name: "Creed Miniature Set", img: "10.jpg", price: 100000 },
            { id: 11, name: "Afnan 9AM/9PM Set", img: "11.jpg", price: 100000 },
            { id: 12, name: "Viktor&Rolf Spicebomb Set", img: "12.jpg", price: 120000 },
            { id: 13, name: "MFK Baccarat Rouge Set", img: "13.jpg", price: 100000 },
            { id: 14, name: "Valentino Born In Roma Set", img: "14.jpg", price: 100000 }
        ];

        let cart = [];

        function init() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map((p, index) => `
                <div class="product-card">
                    <div class="relative w-full aspect-square bg-white flex items-center justify-center p-4">
                        <img src="./${p.img}" class="max-w-full max-h-full object-contain" onerror="this.src='https://via.placeholder.com/400?text=${p.img}'">
                    </div>
                    <div class="p-4 flex flex-col flex-grow text-center">
                        <h3 class="text-[10px] font-bold uppercase tracking-tight text-gray-400 mb-1 h-8 overflow-hidden">${p.name}</h3>
                        <p class="text-sm font-black text-black mb-3">${p.price.toLocaleString()}₮</p>
                        <button onclick="addToCartById(${p.id})" class="w-full bg-black text-white py-2.5 rounded-lg text-[10px] font-black uppercase tracking-widest active:scale-95 transition">Сагслах</button>
                    </div>
                </div>
            `).join('');
            updateCart();
        }

        // Нэрээр нь биш ID-гаар нь сагсладаг болгож өөрчлөв (алдаанаас сэргийлэх)
        function addToCartById(id) {
            const product = products.find(p => p.id === id);
            if (product) {
                cart.push({...product});
                updateCart();
                alert("Сагсанд нэмэгдлээ! ✨");
            }
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, index) => `
                <div class="flex items-center justify-between bg-gray-50 p-2 rounded-xl text-black">
                    <div class="flex items-center space-x-3">
                        <img src="./${item.img}" class="w-12 h-12 object-contain bg-white rounded-lg border">
                        <div>
                            <p class="font-black text-[10px] uppercase">${item.name}</p>
                            <p class="text-red-500 font-black text-xs">${item.price.toLocaleString()}₮</p>
                        </div>
                    </div>
                    <button onclick="removeItem(${index})" class="text-gray-300 hover:text-red-500 px-2 transition"><i class="fas fa-times"></i></button>
                </div>
            `).join('');

            const subTotal = cart.reduce((s, i) => s + i.price, 0);
            const fee = (deliveryType === 'delivery' && cart.length > 0) ? 3000 : 0;
            
            document.getElementById('sub-total').innerText = subTotal.toLocaleString() + '₮';
            document.getElementById('total-price').innerText = (subTotal + fee).toLocaleString() + '₮';
            document.getElementById('delivery-fee-row').className = fee > 0 ? "flex justify-between text-gray-400 uppercase text-[10px]" : "hidden";
        }

        function removeItem(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function copyAcc() { navigator.clipboard.writeText("5458026272"); alert("Данс хуулагдлаа!"); }

        function updateFileName(input) {
            const label = document.getElementById('file-label');
            if (input.files && input.files[0]) {
                label.innerHTML = `<i class="fas fa-check-circle text-green-500 text-xl"></i><p class="text-[10px] font-black mt-2 text-black">${input.files[0].name}</p>`;
            }
        }

        function setDelivery(type) {
            deliveryType = type;
            const btnD = document.getElementById('btn-delivery');
            const btnP = document.getElementById('btn-pickup');
            const info = document.getElementById('pickup-info');
            const addrContainer = document.getElementById('address-container');

            if(type === 'delivery') {
                btnD.className = "py-3 rounded-lg text-[10px] font-black uppercase transition bg-white shadow-sm text-black";
                btnP.className = "py-3 rounded-lg text-[10px] font-black uppercase transition text-gray-400";
                info.classList.add('hidden');
                addrContainer.classList.remove('hidden');
            } else {
                btnP.className = "py-3 rounded-lg text-[10px] font-black uppercase transition bg-white shadow-sm text-black";
                btnD.className = "py-3 rounded-lg text-[10px] font-black uppercase transition text-gray-400";
                info.classList.remove('hidden');
                addrContainer.classList.add('hidden');
            }
            updateCart();
        }

        async function sendOrder() {
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const file = document.getElementById('receipt').files[0];
            const btn = document.getElementById('send-order-btn');

            if (!phone || cart.length === 0) { alert("Утас эсвэл сагс хоосон байна!"); return; }
            if (deliveryType === 'delivery' && !address.trim()) { alert("Хаягаа оруулна уу!"); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> ИЛГЭЭЖ БАЙНА...';

            let msg = `🛍️ *ШИНЭ ЗАХИАЛГА*\n\n📞 Утас: ${phone}\n🚚 Төрөл: ${deliveryType === 'delivery' ? 'Хүргэлтээр' : 'Өөрөө авах'}\n💰 Нийт: ${document.getElementById('total-price').innerText}\n`;
            if(deliveryType === 'delivery') msg += `📍 Хаяг: ${address}\n`;
            msg += `\n📦 Бараанууд:\n`;
            cart.forEach((p, i) => msg += `${i+1}. ${p.name} (${p.price.toLocaleString()}₮)\n`);

            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_ID, text: msg, parse_mode: 'Markdown' })
                });
                if (file) {
                    const fd = new FormData();
                    fd.append('chat_id', TG_ID); fd.append('photo', file);
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }
                alert("Захиалга амжилттай илгээгдлээ! Тантай удахгүй холбогдох болно. ✨");
                cart = []; updateCart(); toggleCart();
            } catch (e) { alert("Алдаа гарлаа!"); }
            finally { btn.disabled = false; btn.innerHTML = 'Захиалга илгээх'; }
        }
        window.onload = init;
    </script>
    <div id="custom-alert" class="custom-alert hidden">
    <div class="alert-content-wrapper">
        <div class="alert-content">
            <div class="alert-icon">
                <i class="fas fa-sparkles alert-sparkles"></i>
            </div>
            <p id="alert-message">Мэдэгдлийн текст энд гарна.</p>
            <button onclick="closeAlert()" class="alert-btn">ОК</button>
        </div>
    </div>
</div>      
</body>
</html>
