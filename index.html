<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enji Perfume Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fafafa; }
        .product-card { border-radius: 20px; overflow: hidden; background: #fff; border: 1px solid #f1f1f1; transition: 0.3s ease-in-out; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-black { background: #000; color: #fff; transition: 0.3s; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #fff; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .file-box { border: 2px dashed #eee; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .file-box:hover { border-color: #000; background: #fff; }
    </style>
</head>
