<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enji Perfume Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fbfbfb; }
        .product-card { border-radius: 20px; overflow: hidden; background: #fff; transition: 0.3s; border: 1px solid #f1f1f1; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-order { background: #000; transition: 0.3s; }
        .btn-order:hover { background: #333; letter-spacing: 2px; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #fff; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
        .custom-file-upload { border: 2px dashed #e5e7eb; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; }
        .custom-file-upload:hover { border-color: #000; background: #f9fafb; }
    </style>
</head>
<body class="text-gray-900">

    <nav class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-gray-100 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter">ENJI PERFUME</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-gray-400 font-bold">Luxury Collection</p>
        </div>
        <div class="flex items-center space-x-6">
            <a href="https://www.facebook.com/share/1KhMToLN7S/" target="_blank" class="text-blue-600 text-xl hover:scale-110 transition"><i class="fab fa-facebook"></i></a>
            <a href="tel:88120525" class="text-gray-800 text-lg hover:text-black"><i class="fas fa-phone-alt"></i></a>
            <button onclick="toggleCart()" class="relative group">
                <i class="fas fa-shopping-bag text-2xl group-hover:scale-110 transition"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
            </button>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-10"></div>
    </main>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full max-w-md bg-white z-[60] shadow-2xl transform translate-x-full transition-transform duration-500 ease-in-out overflow-y-auto">
        <div class="p-8">
            <div class="flex justify-between items-center mb-10 border-b pb-6">
                <h2 class="text-2xl font-black uppercase tracking-tight">Таны сагс</h2>
                <button onclick="toggleCart()" class="text-3xl text-gray-300 hover:text-black transition">&times;</button>
            </div>

            <div id="cart-items" class="space-y-6 mb-8"></div>

            <div class="space-y-6 border-t pt-8">
                <div class="space-y-2">
                    <div class="flex justify-between text-gray-400 font-medium">
                        <span>Барааны дүн:</span>
                        <span id="sub-total">0₮</span>
                    </div>
                    <div id="delivery-fee-row" class="flex justify-between text-gray-400 font-medium">
                        <span>Хүргэлтийн хураамж:</span>
                        <span>3,000₮</span>
                    </div>
                    <div class="flex justify-between text-2xl font-black pt-4 text-black uppercase">
                        <span>Нийт:</span>
                        <span id="total-price">0₮</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 p-1 bg-gray-100 rounded-2xl">
                    <button onclick="setDelivery('delivery')" id="btn-delivery" class="py-3 rounded-xl text-[10px] font-black uppercase transition shadow-sm bg-white text-black">Хүргэлтээр</button>
                    <button onclick="setDelivery('pickup')" id="btn-pickup" class="py-3 rounded-xl text-[10px] font-black uppercase transition text-gray-400">Өөрөө авах</button>
                </div>

                <div id="pickup-info" class="hidden bg-black text-white p-5 rounded-2xl space-y-2">
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-60">📍 Очих хаяг:</p>
                    <p class="text-xs font-medium leading-relaxed">Дундговь аймаг, Сайнцагаан сум, Бабагийн дэлгүүрийн баруун талаасаа 3 дахь хашаа.</p>
                </div>

                <div class="bg-gray-50 p-6 rounded-3xl border border-gray-100 space-y-4">
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Хүлээн авагч</p>
                            <p class="font-bold">Энхжаргал</p>
                        </div>
                        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Khan_Bank_logo.png" class="h-6 opacity-80">
                    </div>
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
                        <div>
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Хаан Банк</p>
                            <p class="font-black text-lg">5458026272</p>
                        </div>
                        <button onclick="copyAcc()" class="bg-black text-white px-4 py-2 rounded-xl text-[10px] font-black active:scale-90 transition">ХУУЛАХ</button>
                    </div>
                </div>

                <div class="space-y-4">
                    <input type="text" id="phone" placeholder="Холбоо барих утас" class="w-full p-4 bg-gray-50 rounded-2xl border border-transparent focus:border-black focus:bg-white transition outline-none font-medium">
                    <textarea id="address" placeholder="Хүргэлтийн дэлгэрэнгүй хаяг" class="w-full p-4 bg-gray-50 rounded-2xl border border-transparent focus:border-black focus:bg-white transition outline-none font-medium h-24"></textarea>
                    
                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest ml-1">Гүйлгээний баримт</p>
                        <label class="custom-file-upload block">
                            <input type="file" id="receipt" class="hidden" onchange="updateFileName(this)">
                            <div id="file-label" class="text-gray-400">
                                <i class="fas fa-cloud-upload-alt text-xl mb-2 block text-black"></i>
                                <span class="text-[10px] font-bold uppercase">Зураг хавсаргах</span>
                            </div>
                        </label>
                    </div>
                </div>

                <button id="send-order-btn" onclick="sendOrder()" class="w-full btn-order text-white py-6 rounded-3xl font-black tracking-[0.2em] shadow-xl active:scale-95 transition uppercase text-sm">
                    Захиалга илгээх
                </button>
                
                <div class="text-center">
                    <a href="https://www.facebook.com/share/1KhMToLN7S/" target="_blank" class="text-[10px] font-bold text-blue-600 hover:underline uppercase tracking-widest"><i class="fab fa-facebook-square mr-1"></i> Манай Facebook хуудас</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TG_TOKEN = '8578358695:AAGDHEjmw1EDhkdH60HWfys498gmuGM-Njo';
        const TG_ID = '7069407872';
        let deliveryType = 'delivery'; 

        const products = [
            { id: 1, name: "Prada Set", img: "1.JPG" },
            { id: 2, name: "D&G Light Blue Set", img: "2.JPG" },
            { id: 3, name: "Victoria's Secret Bombshell", img: "3.JPG" },
            { id: 4, name: "212 Sexy Men", img: "4.JPG" },
            { id: 5, name: "YSL Mon Paris", img: "5.JPG" },
            { id: 6, name: "Prada Luna Rossa Ocean", img: "6.JPG" },
            { id: 7, name: "Bvlgari Pour Homme", img: "7.JPG" },
            { id: 8, name: "Dior Miniature Set", img: "8.JPG" },
            { id: 9, name: "Chanel Miniature Set", img: "9.JPG" },
            { id: 10, name: "Creed Miniature Set", img: "10.JPG" },
            { id: 11, name: "Afnan 9AM/9PM Set", img: "11.JPG" },
            { id: 12, name: "Viktor&Rolf Spicebomb Set", img: "12.JPG" },
            { id: 13, name: "MFK Baccarat Rouge Set", img: "13.JPG" },
            { id: 14, name: "Valentino Born In Roma Set", img: "14.JPG" }
        ];

        let cart = [];

        function init() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => {
                const price = (p.img === "6.JPG" || p.img === "12.JPG") ? 120000 : 100000;
                return `
                    <div class="product-card">
                        <div class="relative h-56 md:h-80 bg-gray-50 flex items-center justify-center p-4">
                            <img src="./${p.img}" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/400?text=${p.img}'">
                            <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black shadow-sm border border-gray-100">
                                ${price.toLocaleString()}₮
                            </div>
                        </div>
                        <div class="p-6 text-center">
                            <h3 class="text-[11px] font-bold uppercase tracking-tight h-10 overflow-hidden mb-4 leading-relaxed text-gray-800">${p.name}</h3>
                            <button onclick="addToCart('${p.name}', ${price}, './${p.img}')" class="w-full bg-black text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-gray-800 transition active:scale-95">Сагслах</button>
                        </div>
                    </div>
                `;
            }).join('');
            updateCart();
        }

        function addToCart(name, price, img) {
            cart.push({ name, price, img });
            updateCart();
            alert("Сагсанд нэмэгдлээ. Төлбөр төлөх бол баруун дээд буланд байрлах сагсан дээр дарна уу. ✨");
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const list = document.getElementById('cart-items');
            list.innerHTML = cart.map((item, index) => `
                <div class="flex items-center justify-between group">
                    <div class="flex items-center space-x-4">
                        <div class="w-16 h-16 bg-gray-50 rounded-2xl p-2 border border-gray-100">
                            <img src="${item.img}" class="w-full h-full object-contain">
                        </div>
                        <div>
                            <p class="font-bold text-xs uppercase tracking-tight text-gray-800">${item.name}</p>
                            <p class="text-red-500 font-black text-sm">${item.price.toLocaleString()}₮</p>
                        </div>
                    </div>
                    <button onclick="removeItem(${index})" class="text-gray-300 hover:text-red-500 transition px-2"><i class="fas fa-times"></i></button>
                </div>
            `).join('');

            const subTotal = cart.reduce((s, i) => s + i.price, 0);
            const fee = (deliveryType === 'delivery' && cart.length > 0) ? 3000 : 0;
            
            document.getElementById('sub-total').innerText = subTotal.toLocaleString() + '₮';
            document.getElementById('total-price').innerText = (subTotal + fee).toLocaleString() + '₮';
            document.getElementById('delivery-fee-row').className = fee > 0 ? "flex justify-between text-gray-400 font-medium" : "hidden";
        }

        function removeItem(i) { cart.splice(i, 1); updateCart(); }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('translate-x-full'); }
        function copyAcc() { navigator.clipboard.writeText("5458026272"); alert("Данс хуулагдлаа!"); }

        function updateFileName(input) {
            const label = document.getElementById('file-label');
            if (input.files && input.files[0]) {
                label.innerHTML = `<span class="text-black font-bold text-[10px] uppercase underline italic">${input.files[0].name} хавсаргав</span>`;
            }
        }

        function setDelivery(type) {
            deliveryType = type;
            const btnD = document.getElementById('btn-delivery');
            const btnP = document.getElementById('btn-pickup');
            const info = document.getElementById('pickup-info');
            const addrInput = document.getElementById('address');

            if(type === 'delivery') {
                btnD.className = "py-3 rounded-xl text-[10px] font-black uppercase transition shadow-sm bg-white text-black";
                btnP.className = "py-3 rounded-xl text-[10px] font-black uppercase transition text-gray-400";
                info.classList.add('hidden');
                addrInput.placeholder = "Хүргэлтийн дэлгэрэнгүй хаяг";
            } else {
                btnP.className = "py-3 rounded-xl text-[10px] font-black uppercase transition shadow-sm bg-white text-black";
                btnD.className = "py-3 rounded-xl text-[10px] font-black uppercase transition text-gray-400";
                info.classList.remove('hidden');
                addrInput.placeholder = "Нэмэлт тайлбар (заавал биш)";
            }
            updateCart();
        }

        async function sendOrder() {
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const file = document.getElementById('receipt').files[0];
            const btn = document.getElementById('send-order-btn');

            if (!phone || cart.length === 0) { alert("Мэдээллээ бүрэн оруулна уу!"); return; }

            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> ИЛГЭЭЖ БАЙНА...';

            let msg = `🛍️ *ШИНЭ ЗАХИАЛГА*\n\n📞 Утас: ${phone}\n🚚 Төрөл: ${deliveryType === 'delivery' ? 'Хүргэлтээр' : 'Өөрөө авах'}\n`;
            if(deliveryType === 'delivery') msg += `📍 Хаяг: ${address}\n`;
            msg += `💰 Нийт: ${document.getElementById('total-price').innerText}\n\n📦 Бараанууд:\n`;
            cart.forEach((p, i) => msg += `${i+1}. ${p.name} (${p.price.toLocaleString()}₮)\n`);

            try {
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_ID, text: msg, parse_mode: 'Markdown' })
                });

                if (file) {
                    const fd = new FormData();
                    fd.append('chat_id', TG_ID);
                    fd.append('photo', file);
                    fd.append('caption', `🧾 Баримт: ${phone}`);
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }

                alert("Захиалга амжилттай илгээгдлээ! Тантай тун удахгүй холбогдох болно. ✨");
                cart = []; updateCart(); toggleCart();
            } catch (e) { alert("Алдаа гарлаа. Дахин оролдоно уу."); }
            finally { btn.disabled = false; btn.innerHTML = 'Захиалга илгээх'; }
        }

        window.onload = init;
    </script>
</body>
</html>
